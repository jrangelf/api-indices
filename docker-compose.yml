version: '3.9'
services:

  pgsqlapi:
    container_name: db-api
    build:
      context: ./pgsqlapi
      dockerfile: dockerfile.pgsqlapi
    ports:
      - '5438:5432'
    restart: always  
    volumes:
      - ./pgsqlapi/db:/var/lib/postgresql/data      
    env_file:
      - ./env/pgsqlapi.env
   
  api:
    container_name: api-indice
    build:
      context: ./api
      dockerfile: ./dockerfile.api         
    ports:
      - '8001:8001'
    restart: on-failure
    volumes:
      - ./api:/api          
    env_file:
      - ./env/api.env 

  revise:
    container_name: revise
    build:
      context: ./revise
      dockerfile: ./dockerfile.revise
    volumes:
      - ./revise:/revise         
    env_file:
      - ./env/revise.env

  pgadmin4:
    image: dpage/pgadmin4:8.4
    container_name: pgadmin4
    ports:
      - "15432:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: api@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    

